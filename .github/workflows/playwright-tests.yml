name: Playwright Automation - Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline
          echo "$(npm bin -g)" >> $GITHUB_PATH
          allure --version

      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true   

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ]; then
            allure generate ./allure-results --clean -o ./allure-report
          else
            echo "No allure-results found, skipping report generation"
          fi

      # ✅ Upload report safely
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7
        continue-on-error: true

      - name: Upload Raw Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7
        continue-on-error: true

      - name: Add Summary to GitHub UI
        if: always()
        run: |
          echo "## Playwright + Allure Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Download report from Artifacts section." >> $GITHUB_STEP_SUMMARY